# Cloudflare Pages — OpenNext output: static files under `.open-next/assets`,
# worker bundle at `.open-next/worker.js` (wired by the OpenNext build).
# `pages_functions_directory` is not a valid Wrangler key (removed vs older snippets).
name = "paidville"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next/assets"

[vars]
NEXT_PUBLIC_SANITY_PROJECT_ID = "qxv0mc90"
NEXT_PUBLIC_SANITY_DATASET = "production"
NEXT_PUBLIC_SITE_URL = "https://paidville.pages.dev"
SANITY_REVALIDATE_SECRET = "paidville2018secret"
